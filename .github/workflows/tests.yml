name: Unit tests

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'lispbar.asd'
      - 'build.lisp'
      - 'Makefile'
      - '.github/workflows/tests.yml'
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'tests/**'

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL + curl
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends sbcl curl

      - name: Install Quicklisp + CFFI
        run: |
          curl -fsSL https://beta.quicklisp.org/quicklisp.lisp -o /tmp/quicklisp.lisp
          sbcl --non-interactive --load /tmp/quicklisp.lisp \
               --eval "(quicklisp-quickstart:install :path \"$HOME/quicklisp/\")" \
               --eval "(ql:quickload :cffi :silent t)"

      - name: Run unit tests
        run: sh tests/run-tests.sh
